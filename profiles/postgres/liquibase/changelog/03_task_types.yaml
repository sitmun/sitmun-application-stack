databaseChangeLog:
  - changeSet:
      id: 3
      author: sitmun
      runOnChange: true
      changes:
        - loadUpdateData:
            encoding: UTF-8
            file: 03_task_types/STM_TSK_TYP.csv
            relativeToChangelogFile: true
            tableName: STM_TSK_TYP
            primaryKey: TTY_ID
            quotchar: "\""
            columns:
              - column:
                  name: TTY_ID
                  type: NUMERIC
              - column:
                  name: TTY_NAME
                  type: STRING
              - column:
                  name: TTY_TITLE
                  type: STRING
              - column:
                  name: TTY_ENABLED
                  type: BOOLEAN
              - column:
                  name: TTY_PARENTID
                  type: NUMERIC
              - column:
                  name: TTY_ORDER
                  type: NUMERIC
        - sql:
            sql: "UPDATE STM_SEQUENCE SET SEQ_COUNT = (SELECT COALESCE(MAX(TTY_ID), 0) + 1 FROM STM_TSK_TYP) WHERE SEQ_NAME = 'TTY_ID'"
