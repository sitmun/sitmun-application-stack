databaseChangeLog:
  - changeSet:
      id: 6
      author: sitmun
      runOnChange: true
      changes:
        - loadUpdateData:
            encoding: UTF-8
            file: 06_params/STM_CONF.csv
            relativeToChangelogFile: true
            tableName: STM_CONF
            primaryKey: CNF_ID
            columns:
              - column:
                  name: CNF_ID
                  type: NUMERIC
              - column:
                  name: CNF_NAME
                  type: STRING
              - column:
                  name: CNF_VALUE
                  type: STRING
        - sql:
            sql: "UPDATE STM_SEQUENCE SET SEQ_COUNT = (SELECT COALESCE(MAX(CNF_ID), 0) + 1 FROM STM_CONF) WHERE SEQ_NAME = 'CNF_ID'"
