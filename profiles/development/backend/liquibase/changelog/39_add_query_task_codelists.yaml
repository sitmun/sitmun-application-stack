databaseChangeLog:
  - changeSet:
      id: 39
      author: sitmun
      context: dev,prod
      comment: Add codelists for queryTask.scope (URL, resource), queryTask.mimeType and service.authenticationMode (API key)
      changes:
        - sql:
            sql: |
              INSERT INTO STM_CODELIST (COD_ID, COD_LIST, COD_VALUE, COD_SYSTEM, COD_DEFAULT, COD_DESCRIPTION)
              SELECT (SELECT COALESCE(MAX(COD_ID), 0) + 1 FROM STM_CODELIST),
                     'queryTask.scope', 'URL', TRUE, FALSE, 'URL'
              WHERE NOT EXISTS (
                SELECT 1 FROM STM_CODELIST WHERE COD_LIST = 'queryTask.scope' AND COD_VALUE = 'URL'
              )
        - sql:
            sql: |
              INSERT INTO STM_CODELIST (COD_ID, COD_LIST, COD_VALUE, COD_SYSTEM, COD_DEFAULT, COD_DESCRIPTION)
              SELECT (SELECT COALESCE(MAX(COD_ID), 0) + 1 FROM STM_CODELIST),
                     'queryTask.scope', 'resource', TRUE, FALSE, 'Resource'
              WHERE NOT EXISTS (
                SELECT 1 FROM STM_CODELIST WHERE COD_LIST = 'queryTask.scope' AND COD_VALUE = 'resource'
              )
