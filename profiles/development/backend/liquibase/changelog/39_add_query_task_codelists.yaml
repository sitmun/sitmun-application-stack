      rollback:
        - sql:
            sql: |
              DELETE FROM STM_CODELIST
              WHERE (COD_LIST = 'queryTask.scope' AND COD_VALUE IN ('URL', 'resource'))
                 OR COD_LIST = 'queryTask.mimeType'
                 OR (COD_LIST = 'service.authenticationMode' AND COD_VALUE = 'API key')
