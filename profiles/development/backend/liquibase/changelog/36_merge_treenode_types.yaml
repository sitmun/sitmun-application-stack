databaseChangeLog:
  - changeSet:
      id: 36
      author: sitmun
      context: dev,prod
      comment: Add treenode.node.type codelist with all node types (additive; legacy lists unchanged)
      changes:
        - sql:
            sql: |
              INSERT INTO STM_CODELIST (COD_ID, COD_LIST, COD_VALUE, COD_SYSTEM, COD_DEFAULT, COD_DESCRIPTION)
              SELECT (SELECT COALESCE(MAX(COD_ID), 0) + 1 FROM STM_CODELIST), 'treenode.node.type', 'cartography', TRUE, FALSE, 'Cartography'
              WHERE NOT EXISTS (SELECT 1 FROM STM_CODELIST WHERE COD_LIST = 'treenode.node.type' AND COD_VALUE = 'cartography')
        - sql:
            sql: |
              INSERT INTO STM_CODELIST (COD_ID, COD_LIST, COD_VALUE, COD_SYSTEM, COD_DEFAULT, COD_DESCRIPTION)
              SELECT (SELECT COALESCE(MAX(COD_ID), 0) + 1 FROM STM_CODELIST), 'treenode.node.type', 'folder', TRUE, FALSE, 'Folder'
              WHERE NOT EXISTS (SELECT 1 FROM STM_CODELIST WHERE COD_LIST = 'treenode.node.type' AND COD_VALUE = 'folder')
        - sql:
            sql: |
              INSERT INTO STM_CODELIST (COD_ID, COD_LIST, COD_VALUE, COD_SYSTEM, COD_DEFAULT, COD_DESCRIPTION)
              SELECT (SELECT COALESCE(MAX(COD_ID), 0) + 1 FROM STM_CODELIST), 'treenode.node.type', 'list', TRUE, FALSE, 'List'
              WHERE NOT EXISTS (SELECT 1 FROM STM_CODELIST WHERE COD_LIST = 'treenode.node.type' AND COD_VALUE = 'list')
        - sql:
            sql: |
              INSERT INTO STM_CODELIST (COD_ID, COD_LIST, COD_VALUE, COD_SYSTEM, COD_DEFAULT, COD_DESCRIPTION)
              SELECT (SELECT COALESCE(MAX(COD_ID), 0) + 1 FROM STM_CODELIST), 'treenode.node.type', 'menu', TRUE, FALSE, 'Menu'
              WHERE NOT EXISTS (SELECT 1 FROM STM_CODELIST WHERE COD_LIST = 'treenode.node.type' AND COD_VALUE = 'menu')
        - sql:
            sql: |
              INSERT INTO STM_CODELIST (COD_ID, COD_LIST, COD_VALUE, COD_SYSTEM, COD_DEFAULT, COD_DESCRIPTION)
              SELECT (SELECT COALESCE(MAX(COD_ID), 0) + 1 FROM STM_CODELIST), 'treenode.node.type', 'task', TRUE, FALSE, 'Task'
              WHERE NOT EXISTS (SELECT 1 FROM STM_CODELIST WHERE COD_LIST = 'treenode.node.type' AND COD_VALUE = 'task')
        - sql:
            sql: |
              INSERT INTO STM_CODELIST (COD_ID, COD_LIST, COD_VALUE, COD_SYSTEM, COD_DEFAULT, COD_DESCRIPTION)
              SELECT (SELECT COALESCE(MAX(COD_ID), 0) + 1 FROM STM_CODELIST), 'treenode.node.type', 'fav', TRUE, FALSE, 'Favorites'
              WHERE NOT EXISTS (SELECT 1 FROM STM_CODELIST WHERE COD_LIST = 'treenode.node.type' AND COD_VALUE = 'fav')
        - sql:
            sql: |
              INSERT INTO STM_CODELIST (COD_ID, COD_LIST, COD_VALUE, COD_SYSTEM, COD_DEFAULT, COD_DESCRIPTION)
              SELECT (SELECT COALESCE(MAX(COD_ID), 0) + 1 FROM STM_CODELIST), 'treenode.node.type', 'map', TRUE, FALSE, 'Map'
              WHERE NOT EXISTS (SELECT 1 FROM STM_CODELIST WHERE COD_LIST = 'treenode.node.type' AND COD_VALUE = 'map')
        - sql:
            sql: |
              INSERT INTO STM_CODELIST (COD_ID, COD_LIST, COD_VALUE, COD_SYSTEM, COD_DEFAULT, COD_DESCRIPTION)
              SELECT (SELECT COALESCE(MAX(COD_ID), 0) + 1 FROM STM_CODELIST), 'treenode.node.type', 'nm', TRUE, FALSE, 'Near me'
              WHERE NOT EXISTS (SELECT 1 FROM STM_CODELIST WHERE COD_LIST = 'treenode.node.type' AND COD_VALUE = 'nm')
        - sql:
            sql: |
              UPDATE STM_SEQUENCE SET SEQ_COUNT = (SELECT COALESCE(MAX(COD_ID), 0) + 1 FROM STM_CODELIST) WHERE SEQ_NAME = 'COD_ID'
      rollback:
        - sql:
            sql: |
              DELETE FROM STM_TRANSLATION WHERE TRA_COLUMN = 'CodeListValue.description' AND TRA_ELEID IN (SELECT COD_ID FROM STM_CODELIST WHERE COD_LIST = 'treenode.node.type')
        - sql:
            sql: |
              DELETE FROM STM_CODELIST WHERE COD_LIST = 'treenode.node.type'

