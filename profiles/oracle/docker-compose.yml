# Oracle profile - standalone deployment, run from this directory.
#
#   cd profiles/oracle
#   docker compose up -d
#
# Paths are relative to profiles/oracle/ (../.. = repo root).
# Create logs dir from repo root if needed: mkdir -p logs/front/nginx
#
# Note: Oracle takes longer to start (~60-120s). The backend will wait
# for Oracle to be healthy before starting.

services:
  front:
    build:
      context: ../..
      dockerfile: front/Dockerfile
      args:
        - PUBLIC_BASE_PATH=${PUBLIC_BASE_PATH:-/}
        - ENVIRONMENT=${ENVIRONMENT:-production}
        - APP_VERSION=${APP_VERSION:-0.0.0}
    restart: always
    ports:
      - "${LOCAL_PORT:-80}:80"
    environment:
      - PUBLIC_URL_SCHEME=${PUBLIC_URL_SCHEME:-http}
      - PUBLIC_HOSTNAME=${PUBLIC_HOSTNAME:-localhost}
      - PUBLIC_PORT=${PUBLIC_PORT:-80}
      - PUBLIC_BASE_PATH=${PUBLIC_BASE_PATH:-/}
      - LOCAL_BASE_PATH=${LOCAL_BASE_PATH:-/}
    volumes:
      - ../../front/config:/etc/nginx/conf.d
      - ../../logs/front/nginx:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    command: /bin/sh -c "envsubst '$${PUBLIC_URL_SCHEME},$${PUBLIC_HOSTNAME},$${PUBLIC_PORT},$${PUBLIC_BASE_PATH},$${LOCAL_BASE_PATH}' < /etc/nginx/conf.d/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost"]
      interval: 30s
      timeout: 30s
      start_period: 5s
      retries: 3

  backend:
    build:
      context: ../../back/backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-oracle}
      - SPRING_DATASOURCE_URL=${DATABASE_URL:-jdbc:oracle:thin:@//oracle:1521/}${DATABASE:-sitmun3}
      - SPRING_DATASOURCE_USERNAME=${DATABASE_USERNAME:-sitmun3}
      - SPRING_DATASOURCE_PASSWORD=${DATABASE_PASSWORD:-sitmun3}
      - SPRING_LIQUIBASE_URL=${DATABASE_URL:-jdbc:oracle:thin:@//oracle:1521/}${DATABASE:-sitmun3}
      - SPRING_LIQUIBASE_USER=${DATABASE_USERNAME:-sitmun3}
      - SPRING_LIQUIBASE_PASSWORD=${DATABASE_PASSWORD:-sitmun3}
      - SPRING_LIQUIBASE_CHANGE_LOG=${SPRING_LIQUIBASE_CHANGE_LOG:-file:/usr/src/config/liquibase/master.xml}
      - SPRING_LIQUIBASE_CONTEXTS=${SPRING_LIQUIBASE_CONTEXTS:-}
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.OracleDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO:-none}
      - SITMUN_PROXY_FORCE=${FORCE_USE_OF_PROXY:-false}
      - SITMUN_PROXY_MIDDLEWARE_URL=${PUBLIC_URL_SCHEME:-http}://${PUBLIC_HOSTNAME:-localhost}:${PUBLIC_PORT:-80}${PUBLIC_BASE_PATH:-/}middleware
      - SITMUN_PROXY_MIDDLEWARE_VALIDATE_USER_ACCESS=${SITMUN_PROXY_MIDDLEWARE_VALIDATE_USER_ACCESS:-true}
      - SITMUN_BACKEND_URL=${PUBLIC_URL_SCHEME:-http}://${PUBLIC_HOSTNAME:-localhost}:${PUBLIC_PORT:-80}${PUBLIC_BASE_PATH:-/}backend
      - SECURITY_AUTHENTICATION_MIDDLEWARE_SECRET=${MIDDLEWARE_SECRET:-9ef80c644166846897f6a87d3cf6ab204d144229}
      - LOGGING_LEVEL_ROOT=${LOGGING_LEVEL_ROOT:-WARN}
      - LOGGING_LEVEL_ORG_SITMUN=${LOGGING_LEVEL_ORG_SITMUN:-INFO}
      - SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT=${HIKARI_CONNECTION_TIMEOUT:-60000}
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=${HIKARI_MAXIMUM_POOL_SIZE:-10}
    volumes:
      - .:/usr/src/config
    depends_on:
      oracle:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/dashboard/health"]
      interval: 30s
      timeout: 30s
      start_period: 120s
      retries: 5

  proxy:
    build:
      context: ../../back/proxy
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - SITMUN_BACKEND_CONFIG_URL=http://backend:8080/api/config/proxy
      - SITMUN_BACKEND_CONFIG_SECRET=${MIDDLEWARE_SECRET:-9ef80c644166846897f6a87d3cf6ab204d144229}
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 30s
      start_period: 5s
      retries: 3

  oracle:
    image: gvenzl/oracle-free:23-slim
    restart: always
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-password}
      APP_USER: ${DATABASE_USERNAME:-sitmun3}
      APP_USER_PASSWORD: ${DATABASE_PASSWORD:-sitmun3}
      ORACLE_DATABASE: ${DATABASE:-sitmun3}
    volumes:
      - oradata:/opt/oracle/oradata
    healthcheck:
      test: |
        bash -c '
        lsnrctl status | grep -q "Service \"${DATABASE:-sitmun3}\"" &&
        echo "SELECT 1 FROM DUAL;" | sqlplus -s ${DATABASE_USERNAME:-sitmun3}/${DATABASE_PASSWORD:-sitmun3}@//localhost:1521/${DATABASE:-sitmun3} | grep -q "1"
        '
      interval: 5s
      timeout: 5s
      start_period: 60s
      retries: 20

volumes:
  oradata:
