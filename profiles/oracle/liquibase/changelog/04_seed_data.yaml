databaseChangeLog:
  - changeSet:
      id: 4
      author: sitmun
      runOnChange: true
      changes:
        - loadUpdateData:
            encoding: UTF-8
            file: 04_seed_data/STM_TER_TYP.csv
            relativeToChangelogFile: true
            tableName: STM_TER_TYP
            primaryKey: TET_ID
            usePreparedStatements: true
            columns:
              - column:
                  name: TET_ID
                  type: NUMERIC
              - column:
                  name: TET_NAME
                  type: STRING
              - column:
                  name: TET_OFFICIAL
                  type: BOOLEAN
              - column:
                  name: TET_TOP
                  type: BOOLEAN
              - column:
                  name: TET_BOTTOM
                  type: BOOLEAN
        - loadUpdateData:
            encoding: UTF-8
            file: 04_seed_data/STM_USER.csv
            relativeToChangelogFile: true
            tableName: STM_USER
            primaryKey: USE_ID
            usePreparedStatements: true
            columns:
              - column:
                  name: USE_ID
                  type: NUMERIC
              - column:
                  name: USE_USER
                  type: STRING
              - column:
                  name: USE_PWD
                  type: STRING
              - column:
                  name: USE_NAME
                  type: STRING
              - column:
                  name: USE_SURNAME
                  type: STRING
              - column:
                  name: USE_ADM
                  type: BOOLEAN
              - column:
                  name: USE_BLOCKED
                  type: BOOLEAN
              - column:
                  name: USE_CREATED
                  type: DATETIME
        - loadUpdateData:
            encoding: UTF-8
            file: 04_seed_data/STM_GRP_TSK.csv
            relativeToChangelogFile: true
            tableName: STM_GRP_TSK
            primaryKey: GTS_ID
            usePreparedStatements: true
            columns:
              - column:
                  name: GTS_ID
                  type: NUMERIC
              - column:
                  name: GTS_NAME
                  type: STRING
        - loadUpdateData:
            encoding: UTF-8
            file: 04_seed_data/STM_TSK_UI.csv
            relativeToChangelogFile: true
            tableName: STM_TSK_UI
            primaryKey: TUI_ID
            usePreparedStatements: true
            columns:
              - column:
                  name: TUI_ID
                  type: NUMERIC
              - column:
                  name: TUI_NAME
                  type: STRING
              - column:
                  name: TUI_TOOLTIP
                  type: STRING
              - column:
                  name: TUI_ORDER
                  type: NUMERIC
              - column:
                  name: TUI_TYPE
                  type: STRING
        - loadUpdateData:
            encoding: UTF-8
            file: 04_seed_data/STM_TASK.csv
            relativeToChangelogFile: true
            tableName: STM_TASK
            primaryKey: TAS_ID
            usePreparedStatements: true
            columns:
              - column:
                  name: TAS_ID
                  type: NUMERIC
              - column:
                  name: TAS_NAME
                  type: STRING
              - column:
                  name: TAS_CREATED
                  type: DATETIME
              - column:
                  name: TAS_ORDER
                  type: NUMERIC
              - column:
                  name: TAS_GIID
                  type: NUMERIC
              - column:
                  name: TAS_SERID
                  type: NUMERIC
              - column:
                  name: TAS_GTASKID
                  type: NUMERIC
              - column:
                  name: TAS_TTASKID
                  type: NUMERIC
              - column:
                  name: TAS_TUIID
                  type: NUMERIC
              - column:
                  name: TAS_CONNID
                  type: NUMERIC
              - column:
                  name: TAS_PARAMS
                  type: STRING
        - sql:
            sql: "UPDATE STM_SEQUENCE SET SEQ_COUNT = (SELECT COALESCE(MAX(TET_ID), 0) + 1 FROM STM_TER_TYP) WHERE SEQ_NAME = 'TET_ID'"
        - sql:
            sql: "UPDATE STM_SEQUENCE SET SEQ_COUNT = (SELECT COALESCE(MAX(USE_ID), 0) + 1 FROM STM_USER) WHERE SEQ_NAME = 'USE_ID'"
        - sql:
            sql: "UPDATE STM_SEQUENCE SET SEQ_COUNT = (SELECT COALESCE(MAX(GTS_ID), 0) + 1 FROM STM_GRP_TSK) WHERE SEQ_NAME = 'GTS_ID'"
        - sql:
            sql: "UPDATE STM_SEQUENCE SET SEQ_COUNT = (SELECT COALESCE(MAX(TUI_ID), 0) + 1 FROM STM_TSK_UI) WHERE SEQ_NAME = 'TUI_ID'"
        - sql:
            sql: "UPDATE STM_SEQUENCE SET SEQ_COUNT = (SELECT COALESCE(MAX(TAS_ID), 0) + 1 FROM STM_TASK) WHERE SEQ_NAME = 'TAS_ID'"
