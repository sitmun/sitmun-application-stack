databaseChangeLog:
  - changeSet:
      id: 2
      author: sitmun
      runOnChange: true
      changes:
        - loadUpdateData:
            encoding: UTF-8
            file: 02_codelists/STM_CODELIST.csv
            relativeToChangelogFile: true
            tableName: STM_CODELIST
            primaryKey: COD_ID
            columns:
              - column:
                  name: COD_ID
                  type: NUMERIC
              - column:
                  name: COD_LIST
                  type: STRING
              - column:
                  name: COD_VALUE
                  type: STRING
              - column:
                  name: COD_SYSTEM
                  type: BOOLEAN
              - column:
                  name: COD_DEFAULT
                  type: BOOLEAN
              - column:
                  name: COD_DESCRIPTION
                  type: STRING
        - sql:
            sql: "UPDATE STM_SEQUENCE SET SEQ_COUNT = (SELECT COALESCE(MAX(COD_ID), 0) + 1 FROM STM_CODELIST) WHERE SEQ_NAME = 'COD_ID'"
